<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aloha Scout Asset Proof</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #111; color: #f5f5f5; }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 24px; }
    h1 { margin-top: 0; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .card { background: #1a1a1f; border: 1px solid #333; border-radius: 16px; overflow: hidden; }
    .card h2 { margin: 0; padding: 16px 18px; font-size: 18px; border-bottom: 1px solid #333; }
    .card img { display: block; width: 100%; height: 420px; object-fit: cover; background: #222; }
    .meta { padding: 14px 18px; color: #cfcfcf; font-size: 14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Aloha Scout raw asset proof</h1>
    <div class="grid">
      <article class="card">
        <h2>Current restaurant-hero.jpg</h2>
        <img src="/restaurant-hero.jpg" alt="Current restaurant hero asset" />
        <div class="meta">This is the exact asset currently used by the site.</div>
      </article>
      <article class="card">
        <h2>Current social-preview.png</h2>
        <img src="/social-preview.png" alt="Current social preview asset" />
        <div class="meta">This is the exact custom preview card currently used by OG/Twitter tags.</div>
      </article>
    </div>
  </div>
</body>
</html>
